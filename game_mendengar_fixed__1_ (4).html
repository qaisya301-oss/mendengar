const words=[
  {w:"baju",h:"ju"},{w:"dagu",h:"gu"},{w:"bola",h:"la"},
  {w:"baca",h:"ca"},{w:"dada",h:"da",split:2},{w:"dana",h:"na"},
  {w:"dadu",h:"du"},{w:"beca",h:"ca"},{w:"duku",h:"ku"},{w:"buku",h:"ku"}
];

const CUSTOM_AUDIO = {
  0: "data:audio/ogg;base64," + BAJU_B64,
  1: "data:audio/ogg;base64," + DAGU_B64,
  2: "data:audio/ogg;base64," + BOLA_B64,
  3: "data:audio/ogg;base64," + BACA_B64,
  4: "data:audio/ogg;base64," + DADA_B64,
  5: "data:audio/ogg;base64," + DANA_B64,
  6: "data:audio/ogg;base64," + DADU_B64,
  7: "data:audio/ogg;base64," + BECA_B64,
  8: "data:audio/ogg;base64," + DUKU_B64,
  9: "data:audio/ogg;base64," + BUKU_B64
};

const container=document.getElementById('slides');
const dotsEl=document.getElementById('dots');
let cur=0;
const synth=window.speechSynthesis;
let currentAudio=null;

words.forEach((item,i)=>{
  const idx=item.split!==undefined ? item.split : item.w.indexOf(item.h);
  const black=item.w.slice(0,idx);
  const pink=item.w.slice(idx);
  const div=document.createElement('div');
  div.className='slide'+(i===0?' active':'');
  div.id='s'+i;
  div.innerHTML=`
    <div class="card-frame">
      <div class="word-big">
        <span class="wblack">${black}</span><span class="wpink">${pink}</span>
      </div>
    </div>
    <button class="sound-btn" id="b${i}" onclick="speak(${i})">&#128266;</button>
  `;
  container.appendChild(div);
  const dot=document.createElement('div');
  dot.className='dot'+(i===0?' on':'');
  dot.id='d'+i;
  dotsEl.appendChild(dot);
});

function speak(i){
  if(currentAudio){currentAudio.pause();currentAudio=null;}
  if(synth.speaking)synth.cancel();
  const btn=document.getElementById('b'+i);
  btn.classList.add('playing');
  if(CUSTOM_AUDIO[i]){
    const audio=new Audio(CUSTOM_AUDIO[i]);
    currentAudio=audio;
    audio.onended=()=>{btn.classList.remove('playing');currentAudio=null;};
    audio.onerror=(e)=>{console.log('audio error',e);btn.classList.remove('playing');currentAudio=null;};
    audio.play().catch(e=>{
      console.log('play error',e);
      btn.classList.remove('playing');
      currentAudio=null;
    });
  } else {
    const u=new SpeechSynthesisUtterance(words[i].w);
    u.lang='ms-MY';u.rate=0.78;u.pitch=1;
    u.onend=()=>btn.classList.remove('playing');
    u.onerror=()=>btn.classList.remove('playing');
    synth.speak(u);
  }
}

function go(dir){
  if(currentAudio){currentAudio.pause();currentAudio=null;}
  if(synth.speaking)synth.cancel();
  document.getElementById('b'+cur).classList.remove('playing');
  document.getElementById('s'+cur).classList.remove('active');
  document.getElementById('d'+cur).classList.remove('on');
  cur=Math.max(0,Math.min(words.length-1,cur+dir));
  document.getElementById('s'+cur).classList.add('active');
  document.getElementById('d'+cur).classList.add('on');
  document.getElementById('ctr').textContent=(cur+1)+' / '+words.length;
  document.getElementById('prev').disabled=cur===0;
  document.getElementById('next').disabled=cur===words.length-1;
  speak(cur);
}

document.getElementById('prev').disabled=true;
setTimeout(()=>speak(0),800);
</script>
